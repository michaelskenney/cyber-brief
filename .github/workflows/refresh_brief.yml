name: Refresh Cyber Threat Brief

on:
  workflow_dispatch:
    # Manual trigger only — primary pipeline runs locally via launchd

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_brief.py

      - name: Commit and push updated brief
        run: |
          git config user.name  "Cyber Brief Bot"
          git config user.email "actions@github.com"
          git add docs/data/brief.json docs/data/usage_log.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh cyber brief $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
